name: Deploy to EC2

concurrency:
  group: deploy-main
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (if script exists)
        run: npm run lint --if-present

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Next.js image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pruthvi-app:latest
            ${{ secrets.DOCKER_USERNAME }}/pruthvi-app:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=https://pruthvi.tech
            NEXT_PUBLIC_HOCUSPOCUS_URL=wss://pruthvi.tech/collab
            NEXT_PUBLIC_WS_URL=wss://pruthvi.tech/collab
            NEXT_PUBLIC_SOCKET_URL=wss://pruthvi.tech/collab
            NEXT_PUBLIC_EDITOR_DEFAULT_TITLE=${{ secrets.NEXT_PUBLIC_EDITOR_DEFAULT_TITLE }}
            NEXT_PUBLIC_ALLOW_GUEST_WRITE=${{ secrets.NEXT_PUBLIC_ALLOW_GUEST_WRITE }}
            NEXT_PUBLIC_DEFAULT_WORKSPACE_ID=${{ secrets.NEXT_PUBLIC_DEFAULT_WORKSPACE_ID }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            SUPABASE_DB_URL=${{ secrets.SUPABASE_DB_URL }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DIRECT_URL=${{ secrets.DIRECT_URL }}

      - name: Build and push collaboration image
        uses: docker/build-push-action@v6
        with:
          context: ./collaboration-server
          file: ./collaboration-server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pruthvi-collab:latest
            ${{ secrets.DOCKER_USERNAME }}/pruthvi-collab:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            if [ -f /home/ubuntu/app/docker-compose.yml ]; then
              APP_DIR=/home/ubuntu/app
            elif [ -f /home/ubuntu/app/app/docker-compose.yml ]; then
              APP_DIR=/home/ubuntu/app/app
            else
              echo "docker-compose.yml not found in /home/ubuntu/app or /home/ubuntu/app/app"
              exit 1
            fi

            cd "$APP_DIR"
            echo "Deploying from: $APP_DIR"

            if [ ! -f .env.production ]; then
              echo ".env.production is missing"
              exit 1
            fi

            if ! grep -q '^DOCKER_USERNAME=' .env.production; then
              echo "DOCKER_USERNAME is missing in .env.production"
              exit 1
            fi

            docker compose --env-file .env.production pull nextjs-app collab-server nginx
            docker compose --env-file .env.production up -d --remove-orphans
            docker image prune -f
            docker compose --env-file .env.production ps
            docker compose --env-file .env.production logs --tail=60 nextjs-app collab-server || true
