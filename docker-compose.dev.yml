services:
  nextjs-app:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env.local
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - app-network

  collab-server:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env.local
    command: sh -c "npm ci && npm run dev"
    ports:
      - "1234:1234"
    volumes:
      - ./collaboration-server:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
